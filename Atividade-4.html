<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Abastecimento</title>
    <link rel="stylesheet" href="Atividade-4.css">
</head>
<body>

    <div class="container">
        <h1>Calculadora de Abastecimento</h1>

        <label>Tipo de combustível:</label>
        <select id="combustivel">
            <option value="">Selecione</option>
            <option value="gasolina">Gasolina</option>
            <option value="etanol">Etanol</option>
            <option value="diesel">Diesel</option>
        </select>

        <label>Litros:</label>
        <input type="number" id="litros" placeholder="Digite os litros">

        <button onclick="calcularAbastecimento()">Calcular</button>

        <h2 id="resultado"></h2>
    </div>

    <script src="Atividade-4.js"></script>
    </body>
</html>
